<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traceursniper — Camisetas Temáticas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E8192C;
      --purple: #7B2FBE;
      --red-glow: rgba(232,25,44,0.4);
      --purple-glow: rgba(123,47,190,0.4);
      --bg: #080808;
      --surface: #111111;
      --text: #F0F0F0;
      --muted: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BANNER */
    .banner-wrap {
      width: 100%;
      background: #000;
      padding: 0;
      line-height: 0;
    }
    .banner-wrap img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 48px 24px 32px;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), var(--purple), transparent);
    }
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-wrap img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px var(--red-glow));
    }
    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--red), #fff 40%, var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }
    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hero-desc {
      font-size: 1rem;
      color: #bbb;
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* DIVIDER */
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--purple));
      margin: 28px auto;
      border-radius: 2px;
    }

    /* TIENDAS */
    .stores {
      padding: 0 24px 48px;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .store-label {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-radius: 4px;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    .btn-tostadora {
      background: var(--surface);
      border: 1px solid var(--red);
      color: #fff;
      box-shadow: 0 0 0 rgba(232,25,44,0);
    }
    .btn-tostadora::before { background: linear-gradient(90deg, rgba(232,25,44,0.12), transparent); }
    .btn-tostadora:hover { box-shadow: 0 4px 24px var(--red-glow); }

    .btn-redbubble {
      background: var(--surface);
      border: 1px solid var(--purple);
      color: #fff;
      box-shadow: 0 0 0 rgba(123,47,190,0);
    }
    .btn-redbubble::before { background: linear-gradient(90deg, rgba(123,47,190,0.12), transparent); }
    .btn-redbubble:hover { box-shadow: 0 4px 24px var(--purple-glow); }

    .btn-icon {
      font-size: 1.3rem;
      opacity: 0.7;
    }
    .btn-badge {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      font-weight: 400;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }
    .btn-text { display: flex; flex-direction: column; }

    /* REDES — preparadas para añadir */
    .social-section {
      padding: 0 24px 56px;
      max-width: 520px;
      margin: 0 auto;
    }
    .social-label {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .social-slots {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .social-slot {
      width: 52px;
      height: 52px;
      border-radius: 4px;
      border: 1px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Barlow Condensed', sans-serif;
      cursor: default;
      transition: border-color 0.2s;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid #1a1a1a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .logo-wrap img { width: 110px; height: 110px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }
  </style>
</head>
